      .smallCaps { font-size: 16px; font-weight: 700; letter-spacing: 5px; text-transform: uppercase; }
      .body { font-size: 28px; font-weight: 500; line-height: 1.28; }
      .chipText { font-size: 18px; font-weight: 700; fill: #f7ead1; }
      .chipSub { font-size: 13px; font-weight: 600; fill: #bca875; letter-spacing: 1px; }
    </style>
