    <radialGradient id="goldGlow" cx="0.7" cy="0.38" r="0.5">
      <stop offset="0" stop-color="#f4d28a" stop-opacity="0.22"/>
      <stop offset="0.56" stop-color="#d4a24a" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#030302" stop-opacity="0"/>
