<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="leftFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#030302" stop-opacity="0.98"/>
      <stop offset="0.58" stop-color="#030302" stop-opacity="0.83"/>
      <stop offset="1" stop-color="#030302" stop-opacity="0.18"/>
    </linearGradient>
    <linearGradient id="goldText" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6dda0"/>
      <stop offset="0.52" stop-color="#d4a24a"/>
      <stop offset="1" stop-color="#f4d28a"/>
    </linearGradient>
    <linearGradient id="geminiGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4285f4"/>
      <stop offset="0.52" stop-color="#9b72cb"/>
      <stop offset="1" stop-color="#d96570"/>
    </linearGradient>
    <linearGradient id="chipFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16130b" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#050403" stop-opacity="0.8"/>
